
<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
</head>

<body style="margin:0; font-family:Arial; background:#f4f6f9;">

<!-- Header -->
<div style="background:#343a40; padding:20px; color:white; display:flex; justify-content:space-between; align-items:center;">
<h2 style="margin:0;">Admin Dashboard</h2>

<a href="/logout"
style="background:#dc3545; padding:8px 15px; color:white; text-decoration:none; border-radius:6px;">
Logout
</a>
</div>

<!-- Main Content -->
<div style="padding:40px;">

<!-- Welcome Card -->
<div style="background:white; padding:25px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); margin-bottom:30px;">
<h2>Welcome, {{ email }}</h2>

<a href="/manage_sections">Manage Sections</a>
<br>
<a href="/manage_content">Manage Content</a>

<p>
Total Registered Users:
<strong style="color:#4e73df;">{{ total_users }}</strong>
</p>
</div>

<!-- Users Table -->
<div style="background:white; padding:25px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1);">

<h3 style="margin-top:0;">All Users</h3>

<table style="width:100%; border-collapse:collapse; margin-top:15px;">

<tr style="background:#4e73df; color:white;">
<th style="padding:10px; border:1px solid #ddd;">ID</th>

<th style="padding:10px; border:1px solid #ddd;">Email</th>
<th style="padding:10px; border:1px solid #ddd;">Role</th>
</tr>

{% for user in users %}
<tr style="text-align:center;">

<td style="padding:10px; border:1px solid #ddd;">
{{ user[0] }}
</td>

<td style="padding:10px; border:1px solid #ddd;">
{{ user[1] }}
</td>

<td style="padding:10px; border:1px solid #ddd;">
{{ user[2] }}
</td>



</tr>
{% endfor %}

</table>

</div>
</div>

</body>
</html>
