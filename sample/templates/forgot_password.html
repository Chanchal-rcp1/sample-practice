<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(to right,#4e73df,#1cc88a); display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="background:white; padding:40px; width:350px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center;">

    <h2 style="margin-bottom:10px;">Forgot Password</h2>

    <p style="color:gray; font-size:14px;">
        Enter your registered email to reset your password.
    </p>

    <form action="/forgot_password" method="POST">

        <input 
            type="email" 
            name="email" 
            placeholder="Enter your email"
            required
            style="width:100%; padding:10px; margin-top:15px; border-radius:6px; border:1px solid #ccc;"
        >

        <button 
            type="submit"
            style="width:100%; margin-top:20px; padding:10px; border:none; border-radius:6px; background:#4e73df; color:white; font-size:16px; cursor:pointer;"
        >
            Reset Password
        </button>

    </form>

    <p style="margin-top:20px; font-size:14px;">
        Remember your password?
        <a href="/login" style="color:#4e73df; text-decoration:none;">Login</a>
    </p>

</div>

</body>
</html>
