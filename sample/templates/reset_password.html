<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(to right,#4e73df,#1cc88a); display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="background:white; padding:40px; width:350px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center;">

    <h2 style="margin-bottom:10px;">Reset Password</h2>

    <p style="color:gray; font-size:14px;">
        Enter your new password below.
    </p>

    <form action="/reset_password" method="POST">

        <input 
            type="password" 
            name="new_password" 
            placeholder="New Password"
            required
            style="width:100%; padding:10px; margin-top:15px; border-radius:6px; border:1px solid #ccc;"
        >

        <input 
            type="password" 
            name="confirm_password" 
            placeholder="Confirm Password"
            required
            style="width:100%; padding:10px; margin-top:15px; border-radius:6px; border:1px solid #ccc;"
        >

        <button 
            type="submit"
            style="width:100%; margin-top:20px; padding:10px; border:none; border-radius:6px; background:#1cc88a; color:white; font-size:16px; cursor:pointer;"
        >
            Update Password
        </button>

    </form>

    <p style="margin-top:20px; font-size:14px;">
        Back to
        <a href="/login" style="color:#4e73df; text-decoration:none;">Login</a>
    </p>

</div>

</body>
</html>
